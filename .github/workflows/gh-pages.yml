name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    permissions:
      actions: write
      checks: write
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Prepare publish directory
        run: |
          rm -rf docs
          mkdir -p docs/demo/world
          cp demo/index.html docs/demo/index.html
          cp dist/index.js docs/demo/index.js
          cp dist/index.d.ts docs/demo/index.d.ts
          cp dist/koe-worklet.js docs/demo/koe-worklet.js
          cp dist/world/worldline.js docs/demo/world/worldline.js
          cp dist/world/worldline.wasm docs/demo/world/worldline.wasm
          cp README.md docs/README.md
          touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
